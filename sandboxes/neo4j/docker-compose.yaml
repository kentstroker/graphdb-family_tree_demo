services:
  neo4j:
    image: neo4j:${VERSION}
    container_name: "neo4j"
    volumes:
      - ./data:/data
      - ./import:/var/lib/neo4j/import
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - demo-network
    environment:
      - "NEO4J_ACCEPT_LICENSE_AGREEMENT=yes"
      - "NEO4J_AUTH=neo4j/neo4jadmin"
      - "NEO4J_dbms_security_procedures_unrestricted=apoc.*,n10s.*"
networks:
  demo-network:
    external: true